databases:
  - name: farubikon-db
    databaseName: ticket
    user: farubikon_user
    plan: free

services:
  # ── AI Service (Python / FastAPI) ─────────────────────────────
  - type: web
    name: farubikon-ai
    runtime: python
    plan: free
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: openai/gpt-oss-120b
      - key: GROQ_API_KEY
        sync: false # user must set manually
      - key: PYTHON_VERSION
        value: 3.11.12

  # ── Backend (Bun / Elysia — Docker) ──────────────────────────
  - type: web
    name: farubikon-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: farubikon-db
          property: connectionString
      - key: PORT
        value: 3001
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: AI_SERVICE_URL
        fromService:
          name: farubikon-ai
          type: web
          property: hostport
      - key: BETTER_AUTH_URL
        fromService:
          name: farubikon-backend
          type: web
          property: hostport
      - key: CORS_ORIGINS
        sync: false # user sets frontend URL after deploy

  # ── Frontend (Next.js) ───────────────────────────────────────
  - type: web
    name: farubikon-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: farubikon-backend
          type: web
          property: hostport
